<div class="app-layout">

  <app-sidebar

    [collapsed]="sidebarCollapsed"

    [notas]="notas"

    [notaSeleccionada]="notaSeleccionada"

    (seleccionar)="seleccionarNota($event)"

    (nueva)="crearNota()"

    (eliminar)="eliminarNota($event)"

  ></app-sidebar>

  <div class="main-content">

    <app-toolbar

        [titulo]="
        notaSeleccionada?.titulo || ''
      "
      [mensajeGuardado]="mensajeGuardado"

      (tituloChange)="
        actualizarTitulo($event)
      "

      (guardar)="guardarNota()"

      (eliminar)="eliminarNotaActual()"

      (toggleSidebarEvent)="
        toggleSidebar()
      "
      [fechaCreacion]="

    formatFecha(
    notaSeleccionada?.fechaCreacion
      )"

    [fechaActualizacion]="
    formatFecha(
      notaSeleccionada?.fechaActualizacion
    )"
      
    ></app-toolbar>

    <app-notes-page

      [notaSeleccionada]="notaSeleccionada"

      (contenidoActualizado)="
        sincronizarContenido($event)"

    ></app-notes-page>

  </div>

</div>
