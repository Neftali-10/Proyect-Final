<div class="toolbar">

  <div class="toolbar-left">

    <button
      class="menu-btn"
      (click)="toggleSidebar()"
    >
      ☰
    </button>

    <input
      class="title-input"
      type="text"
      placeholder="Título de la nota"
    />

  </div>

  <div class="toolbar-right">

    <div class="search-box">

      <input
        type="text"
        placeholder="Buscar Notas..."
      />

    </div>

    <button
      class="theme-btn"
      (click)="toggleTheme()"
    >
      🌙
    </button>

  </div>

</div>
