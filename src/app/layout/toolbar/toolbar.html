<div class="toolbar">

  <div class="toolbar-left">

    <button
      class="menu-btn"
      (click)="toggleSidebar()"
    >
      ☰
    </button>

    <div class="title-area">

      <input

        class="title-input"

        type="text"

        placeholder="Título de la nota"

        [(ngModel)]="titulo"

        (ngModelChange)="onTituloChange()"
      />

    <div class="toolbar-meta">

       <span>

          Creada:
          {{ fechaCreacion || '-' }}

        </span>

        <span>

          Actualizada:
          {{ fechaActualizacion || '-' }}

        </span>

      </div>

    </div>

  </div>

  <div class="toolbar-right">

    <!-- STATUS -->

    <div
      class="save-status"
      *ngIf="mensajeGuardado"
    >

      ✔ Guardado

    </div>
    <!-- SAVE -->

    <button class="save-btn"
    (click)="guardarNota()">
      

      💾 

    </button>

    <!-- DELETE -->

    <button class="delete-btn-top"
    (click)="eliminarNota()">

      🗑

    </button>

    <!-- THEME -->

    <button
      class="theme-btn"
      (click)="toggleTheme()"
    >
      🌙
    </button>

  </div>

</div>
